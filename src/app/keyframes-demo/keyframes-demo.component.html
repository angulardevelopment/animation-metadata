<button class="start-btn" (click)="onClick()" [attr.aria-busy]="loading" [disabled]="loading">
  <span class="label">{{ loading ? 'Starting...' : (success ? 'Done' : 'Start') }}</span>
  <span class="icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" width="18" height="18">
      <path d="M8 5v14l11-7z" fill="currentColor"></path>
    </svg>
  </span>
</button>
